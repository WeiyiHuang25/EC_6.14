version: "4.1"
name: KEY
type: ARM
deviceName: null
packDir: null
srcDirs:
  - Core
  - Drivers
  - User
virtualFolder:
  name: <virtual_root>
  files:
    - path: startup_stm32f407xx.s
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: fa9a8f0a36d51812d475d9b1169ea571
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - STM32F407xx
        - USE_HAL_DRIVER
      incList:
        - Core/Inc
        - Drivers/CMSIS/Include
        - Drivers/STM32F4xx_HAL_Driver/Inc
        - Drivers/STM32F4xx_HAL_Driver/Inc/Legacy
        - Drivers/CMSIS/Device/ST/STM32F4xx/Include
        - User
      libList: []
    excludeList: []
    settings:
      debugger: cortex-debug
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: single
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler:
            ASM_FLAGS: ""
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: ""
            C_FLAGS: ""
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: hard
            misc-control: ""
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            LD_FLAGS: ""
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: STM32F407XX_FLASH.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: STM32F407IG
          vendor: ST
        otherCmds: ""
        proType: 1
        speed: 8000
      OpenOCD:
        baseAddr: "0x08000000"
        bin: ""
        interface: cmsis-dap
        target: stm32f4x
    uploader: OpenOCD
